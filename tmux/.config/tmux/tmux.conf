# =============================================================================
# Tmux Configuration File
# =============================================================================

# -----------------------------------------------------------------------------
# General Settings
# -----------------------------------------------------------------------------
set -g default-terminal "screen"
set -g base-index       1
setw -g pane-base-index 1

# -----------------------------------------------------------------------------
# Key Settings
# -----------------------------------------------------------------------------
set -g status-keys emacs
set -g mode-keys   emacs

# -----------------------------------------------------------------------------
# Prefix Key Configuration (C-a instead of C-b)
# -----------------------------------------------------------------------------
unbind C-b
set -g prefix C-a
bind -n -N "Send the prefix key through to the application" C-a send-prefix

# -----------------------------------------------------------------------------
# Window & Pane Behavior
# -----------------------------------------------------------------------------
set  -g mouse             off
set  -g focus-events      off
setw -g aggressive-resize off
setw -g clock-mode-style  12
set  -s escape-time       500
set  -g history-limit     100000

# -----------------------------------------------------------------------------
# Terminal & Color Settings
# -----------------------------------------------------------------------------
# Enable true color support in tmux
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# -----------------------------------------------------------------------------
# Key Bindings
# -----------------------------------------------------------------------------
# Split panes
bind s split-window -v -c "#{pane_current_path}"  # horizontal split (like :split)
bind v split-window -h -c "#{pane_current_path}"  # vertical split (like :vsplit)

# Vim-like pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config
bind r source-file ~/.config/tmux/tmux.conf
